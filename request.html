<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Request an Oil Change | Daviart</title>
<meta name="description" content="Booking form for Daviart mobile oil change — coming soon.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06080F; }
  a { color: #FFB65C; text-decoration: none; }
  a:hover { color: #FFCB8A; }
  @keyframes rise { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes drift { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-18px); } }
</style>
</head>
<body>
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; font-family: 'Manrope', sans-serif; position: relative; overflow: hidden; background: radial-gradient(120% 90% at 50% -10%, #142138 0%, #0A0F1C 45%, #06080F 100%);">

  <div style="position: absolute; top: -180px; left: -120px; width: 520px; height: 520px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, rgba(255,182,92,0.22), rgba(255,140,50,0.06) 55%, transparent 70%); filter: blur(20px); animation: drift 9s ease-in-out infinite;"></div>
  <div style="position: absolute; bottom: -220px; right: -160px; width: 560px; height: 560px; border-radius: 50%; background: radial-gradient(circle at 60% 40%, rgba(60,110,200,0.18), transparent 65%); filter: blur(24px); animation: drift 11s ease-in-out infinite;"></div>

  <div style="position: relative; z-index: 2; max-width: 560px; width: 100%; text-align: center; animation: rise 0.7s ease both;">

    <div style="width: 84px; height: 108px; margin: 0 auto 36px; position: relative; filter: drop-shadow(0 18px 40px rgba(255,150,60,0.35));">
      <div style="width: 84px; height: 84px; position: absolute; bottom: 0; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; background: radial-gradient(circle at 32% 28%, #FFDDA8 0%, #FFB65C 30%, #F1852E 62%, #B85A18 100%);"></div>
      <div style="width: 30px; height: 44px; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); border-radius: 50%; background: radial-gradient(ellipse at 40% 30%, rgba(255,255,255,0.85), rgba(255,255,255,0.1) 60%, transparent 75%);"></div>
      <div style="width: 0; height: 0; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 34px solid #F1852E;"></div>
    </div>

    <div style="display: inline-block; font-family: 'Space Grotesk', sans-serif; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: #FFB65C; border: 1px solid rgba(255,182,92,0.3); border-radius: 100px; padding: 7px 16px; margin-bottom: 26px;">Daviart &middot; Booking</div>

    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 44px; line-height: 1.08; color: #F4F1EA; letter-spacing: -1px; margin-bottom: 18px;">Request an Oil Change</h1>

    <p style="font-size: 18px; line-height: 1.6; color: #A7ADBC; max-width: 420px; margin: 0 auto 40px;">Our booking form is on its way. Very soon you'll be able to schedule a mobile oil change in just a few taps &mdash; wherever you are.</p>

    <div style="display: inline-flex; align-items: center; gap: 10px; background: rgba(255,182,92,0.08); border: 1px solid rgba(255,182,92,0.2); border-radius: 100px; padding: 12px 22px; margin-bottom: 44px; font-family: 'Space Grotesk', sans-serif; font-size: 14px; color: #E8C79A; letter-spacing: 0.3px;">
      <span style="width: 9px; height: 9px; border-radius: 50%; background: #6FCF97; box-shadow: 0 0 12px #6FCF97;"></span>
      Booking form coming soon
    </div>

    <div>
      <a href="index.html" id="back-home-btn" style="display: inline-flex; align-items: center; gap: 10px; font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 16px; color: #1A1206; background: linear-gradient(180deg, #FFCB8A 0%, #F5A623 55%, #E8871A 100%); padding: 16px 34px; border-radius: 100px; box-shadow: 0 12px 34px rgba(245,166,35,0.35), inset 0 1px 0 rgba(255,255,255,0.5); transition: filter .2s ease;">
        &larr; Back to homepage
      </a>
    </div>

  </div>
</div>
<script>
  document.getElementById('back-home-btn').addEventListener('mouseenter', function () { this.style.filter = 'brightness(1.06)'; });
  document.getElementById('back-home-btn').addEventListener('mouseleave', function () { this.style.filter = ''; });
</script>
</body>
</html>
